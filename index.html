    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ─── Utility: timezone-safe local date formatter ───────────────────────
        // Avoids the UTC shift that toISOString() introduces for non-UTC users.
        function formatLocalDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function formatDateTimeLocal(d) {
            const datePart = formatLocalDate(d);
            const h = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${datePart}T${h}:${min}`;
        }

                ),

                ),

                download: (

        // ─── Load BMF rates dynamically from external JSON file ──────────────
        async function fetchBMFRates() {
            const response = await fetch('./bmf-rates.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        }

        // Minimal emergency fallback for offline use
        const EMERGENCY_FALLBACK_RATES = {
            "Germany": { name: "Germany (Inland)", full: 28, small: 14, currency: "EUR" },
            "Austria": { name: "Austria", full: 50, small: 33, currency: "EUR" },
        };

        // ─── Dynamic default nodes (relative to today) ────────────────────────
        function getDefaultNodes() {
            const now = new Date();
            const make = (dayOffset, hours, minutes) => {
                const d = new Date(now);
                d.setDate(d.getDate() + dayOffset);
                d.setHours(hours, minutes, 0, 0);
                return formatDateTimeLocal(d);
            };
            return [
                { id: "node-1", location: "Germany", role: "start", dateTime: make(0, 8, 0), meals: {} },
                { id: "node-2", location: "United Kingdom (London)", role: "destination", dateTime: make(0, 14, 0), meals: {} },
                { id: "node-3", location: "France (Paris)", role: "destination", dateTime: make(2, 11, 0), meals: {} },
                { id: "node-4", location: "Germany", role: "end", dateTime: make(4, 18, 0), meals: {} }
            ];
        }

        // ─── Cache version — bump to clear stale localStorage on rate structure changes ─
        const RATES_CACHE_VERSION = 'v3-lodging';
        // Clear legacy caches on structure change
        try {
            if (localStorage.getItem('perdiem-cache-version') !== RATES_CACHE_VERSION) {
                localStorage.removeItem('perdiem-base-rates');
                localStorage.removeItem('perdiem-rates');
                localStorage.setItem('perdiem-cache-version', RATES_CACHE_VERSION);
            }
        } catch (e) {}

        function loadFromStorage(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    if (parsed !== null) return parsed;
                }
            } catch (e) { /* corrupted data — fall through */ }
            return fallback;
        }

        // ─── PURE FUNCTION: calculateAllowances ───────────────────────────────
        // Extracted from component for testability. No side effects.
        function calculateAllowances(nodes, rates) {
            if (nodes.length < 2) {
                return { dayCalculation: [], totalClaim: 0, originalTotal: 0, totalReductions: 0 };
            }

            const sortedNodes = [...nodes].sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
            const startTime = new Date(sortedNodes[0].dateTime);
            const endTime = new Date(sortedNodes[sortedNodes.length - 1].dateTime);

            if (isNaN(startTime.getTime()) || isNaN(endTime.getTime()) || startTime >= endTime) {
                return { dayCalculation: [], totalClaim: 0, originalTotal: 0, totalReductions: 0 };
            }

            // Build day list using local midnight boundaries (timezone-safe)
            const dayList = [];
            const startDate = new Date(startTime);
            startDate.setHours(0, 0, 0, 0);
            const endDate = new Date(endTime);
            endDate.setHours(0, 0, 0, 0);

            let current = new Date(startDate);
            while (current <= endDate) {
                dayList.push(new Date(current));
                current.setDate(current.getDate() + 1);
            }

            let accumulatedOriginal = 0;
            let accumulatedReductions = 0;
            let accumulatedClaim = 0;

            const calculatedDays = dayList.map((dayDate, index) => {
                const dateString = formatLocalDate(dayDate); // timezone-safe
                const isFirstDay = index === 0;
                const isLastDay = index === dayList.length - 1;
                const isSingleDayTrip = dayList.length === 1;

                // Calculate active hours using wall-clock time (DST-safe)
                let activeHoursToday = 24;
                if (isSingleDayTrip) {
                    const startMins = startTime.getHours() * 60 + startTime.getMinutes();
                    const endMins = endTime.getHours() * 60 + endTime.getMinutes();
                    activeHoursToday = (endMins - startMins) / 60;
                } else if (isFirstDay) {
                    const startMins = startTime.getHours() * 60 + startTime.getMinutes();
                    activeHoursToday = (1440 - startMins) / 60;
                } else if (isLastDay) {
                    const endMins = endTime.getHours() * 60 + endTime.getMinutes();
                    activeHoursToday = endMins / 60;
                }

                // Determine applicable location AND track which node set it
                // (used for meal lookup — fixes the old broken fallback chain)
                let applicableLocation = "Germany";
                let activeNodeId = sortedNodes[0].id;
                const dayEnd = new Date(dayDate);
                dayEnd.setHours(23, 59, 59, 999);
                const dayEndMs = dayEnd.getTime();

                for (let i = 0; i < sortedNodes.length; i++) {
                    const nodeTime = new Date(sortedNodes[i].dateTime);
                    if (nodeTime.getTime() <= dayEndMs) {
                        if (isLastDay && sortedNodes[i].role === 'end') {
                            // Return day: use last foreign destination's rate (Mitternachtsprinzip)
                            const prevForeignNode = sortedNodes.slice(0, i).reverse().find(n => n.role !== 'end');
                            if (prevForeignNode) {
                                applicableLocation = prevForeignNode.location;
                                activeNodeId = prevForeignNode.id;
                                break;
                            }
                        }
                        applicableLocation = sortedNodes[i].location;
                        activeNodeId = sortedNodes[i].id;
                    }
                }

                const rateInfo = rates[applicableLocation] || { full: 28, small: 14, currency: "EUR" };
                const fullRate = rateInfo.full;
                const smallRate = rateInfo.small;

                // Base allowance based on trip structure
                let baseAllowance = 0;
                let statusText = "";

                if (isSingleDayTrip) {
                    if (activeHoursToday > 8) {
                        baseAllowance = smallRate;
                        statusText = "One-day Trip (> 8h)";
                    } else {
                        baseAllowance = 0;
                        statusText = "One-day Trip (< 8h)";
                    }
                } else if (isFirstDay) {
                    baseAllowance = smallRate;
                    statusText = "Departure Day";
                } else if (isLastDay) {
                    baseAllowance = smallRate;
                    statusText = "Return Day";
                } else {
                    baseAllowance = fullRate;
                    statusText = "Full 24h Day";
                }

                // Meal deductions — tied to the SAME node that determined the location
                const activeNode = sortedNodes.find(n => n.id === activeNodeId);
                const mealsObj = activeNode?.meals?.[dateString] || { breakfast: false, lunch: false, dinner: false };
                const breakfastProvided = !!mealsObj.breakfast;
                const lunchProvided = !!mealsObj.lunch;
                const dinnerProvided = !!mealsObj.dinner;

                // Deductions are always based on the full 24h rate per BMF guidelines
                const breakfastDeduction = breakfastProvided ? fullRate * 0.20 : 0;
                const lunchDeduction = lunchProvided ? fullRate * 0.40 : 0;
                const dinnerDeduction = dinnerProvided ? fullRate * 0.40 : 0;
                const totalDeductionsForDay = breakfastDeduction + lunchDeduction + dinnerDeduction;

                const netAllowance = Math.max(0, baseAllowance - totalDeductionsForDay);

                accumulatedOriginal += baseAllowance;
                accumulatedReductions += totalDeductionsForDay;
                accumulatedClaim += netAllowance;

                return {
                    date: dateString,
                    dayOfWeek: dayDate.toLocaleDateString('en-US', { weekday: 'short' }),
                    location: applicableLocation,
                    fullRate,
                    smallRate,
                    statusText,
                    baseAllowance,
                    activeHours: activeHoursToday,
                    breakfastProvided,
                    lunchProvided,
                    dinnerProvided,
                    breakfastDeduction,
                    lunchDeduction,
                    dinnerDeduction,
                    totalDeductionsForDay,
                    netAllowance,
                    nodeId: activeNodeId
                };
            });

            return {
                dayCalculation: calculatedDays,
                totalClaim: accumulatedClaim,
                originalTotal: accumulatedOriginal,
                totalReductions: accumulatedReductions
            };
        }

        // ─── Error Boundary ───────────────────────────────────────────────────
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-[#fafafa]">
                            <div className="bg-white border border-rose-200 rounded-2xl p-8 max-w-md text-center shadow-sm">
                                <h1 className="text-xl font-bold text-rose-700 mb-2">Something went wrong</h1>
                                <p className="text-sm text-neutral-500 mb-4">{this.state.error?.message || "An unexpected error occurred."}</p>
                                <button
                                    onClick={() => { localStorage.clear(); this.setState({ hasError: false, error: null }); }}
                                    className="px-4 py-2 bg-neutral-900 text-white text-sm rounded-lg hover:bg-neutral-800 transition-colors"
                                >
                                    Reset & Reload
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ─── Main App ─────────────────────────────────────────────────────────
        function App() {
            const [rates, setRates] = useState({});
            const [ratesLoaded, setRatesLoaded] = useState(false);
            const [ratesError, setRatesError] = useState(null);
            const [activeTab, setActiveTab] = useState("timeline");
            const [searchQuery, setSearchQuery] = useState("");

            // Always fetch fresh base rates; merge with any custom overrides from localStorage
            const baseRatesRef = useRef({});
            useEffect(() => {
                const customOverrides = loadFromStorage('perdiem-custom-rates', {});
                fetchBMFRates().then(baseData => {
                    baseRatesRef.current = baseData;
                    try { localStorage.setItem('perdiem-base-rates', JSON.stringify(baseData)); } catch (e) {}
                    setRates({ ...baseData, ...customOverrides });
                    setRatesLoaded(true);
                }).catch(err => {
                    // Network error — restore cached base rates so override diffing works
                    const cachedBase = loadFromStorage('perdiem-base-rates', {});
                    if (cachedBase && Object.keys(cachedBase).length > 0) {
                        baseRatesRef.current = cachedBase;
                    }
                    const cached = loadFromStorage('perdiem-rates', null);
                    if (cached && Object.keys(cached).length > 0) {
                        setRates(cached);
                        triggerToast('Using cached rates (offline mode)', 'info');
                    } else {
                        setRates({ ...EMERGENCY_FALLBACK_RATES, ...customOverrides });
                        triggerToast('Using emergency fallback rates (offline mode)', 'info');
                    }
                    setRatesLoaded(true);
                });
            }, []);

            // Toast with ref-based timer cleanup
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });
            const toastTimerRef = useRef(null);

            const triggerToast = (message, type = "success") => {
                if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                setToast({ show: true, message, type });
                toastTimerRef.current = setTimeout(() => {
                    setToast(prev => ({ ...prev, show: false }));
                    toastTimerRef.current = null;
                }, 3500);
            };

            // Custom rate form state
            const [customCountryName, setCustomCountryName] = useState("");
            const [customFullRate, setCustomFullRate] = useState(28);
            const [customSmallRate, setCustomSmallRate] = useState(14);

            // Travel nodes — restored from localStorage or defaults
            const [nodes, setNodes] = useState(() => loadFromStorage('perdiem-nodes', getDefaultNodes()));

            // Drag-and-drop counter ref (prevents flicker on child elements)
            const [dragActive, setDragActive] = useState(false);
            const dragCounter = useRef(0);
            const fileInputRef = useRef(null);

            // Persist nodes to localStorage
            useEffect(() => {
                try { localStorage.setItem('perdiem-nodes', JSON.stringify(nodes)); } catch (e) {}
            }, [nodes]);

            // Persist only custom overrides (delta from base rates) to localStorage
            useEffect(() => {
                if (!ratesLoaded || Object.keys(rates).length === 0) return;
                try {
                    const base = baseRatesRef.current;
                    // Only compute overrides when base rates have been loaded (prevents
                    // silent data corruption when offline with empty baseRatesRef)
                    if (base && Object.keys(base).length > 0) {
                        const overrides = {};
                        for (const key of Object.keys(rates)) {
                            if (!base[key] || JSON.stringify(rates[key]) !== JSON.stringify(base[key])) {
                                overrides[key] = rates[key];
                            }
                        }
                        localStorage.setItem('perdiem-custom-rates', JSON.stringify(overrides));
                    }
                    // Always keep a full snapshot for offline fallback
                    localStorage.setItem('perdiem-rates', JSON.stringify(rates));
                } catch (e) {}
            }, [rates, ratesLoaded]);

            // Pure computation via useMemo (replaces useEffect + 4 state setters)
            const { dayCalculation, totalClaim, originalTotal, totalReductions } = useMemo(
                () => calculateAllowances(nodes, rates),
                [nodes, rates]
            );

            // ─── Node operations ──────────────────────────────────────────────
            const addNode = (index) => {
                const prevNode = nodes[index];
                let prevDate = prevNode ? new Date(prevNode.dateTime) : new Date();
                if (isNaN(prevDate.getTime())) prevDate = new Date();
                const nextDate = new Date(prevDate);
                nextDate.setDate(nextDate.getDate() + 1);

                const newNode = {
                    id: `node-${Date.now()}-${Math.random().toString(36).substr(2, 4)}`,
                    location: "Austria",
                    role: "destination",
                    dateTime: formatDateTimeLocal(nextDate),
                    meals: {}
                };

                const updated = [...nodes];
                updated.splice(index + 1, 0, newNode);
                reassignRoles(updated);
                triggerToast("Inserted intermediate destination stop.", "success");
            };

            const removeNode = (id) => {
                if (nodes.length <= 2) return;
                const updated = nodes.filter(n => n.id !== id);
                reassignRoles(updated);
                triggerToast("Removed stop location from your path.", "success");
            };

            const reassignRoles = (list) => {
                const sorted = [...list].sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
                const finalized = sorted.map((node, i) => {
                    let role = "destination";
                    if (i === 0) role = "start";
                    else if (i === sorted.length - 1) role = "end";
                    return { ...node, role };
                });
                setNodes(finalized);
            };

            const updateNodeProperty = (id, prop, value) => {
                let updated = nodes.map(node => {
                    if (node.id === id) return { ...node, [prop]: value };
                    return node;
                });

                if (prop === 'dateTime') {
                    updated.sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
                    updated = updated.map((node, i) => {
                        let role = "destination";
                        if (i === 0) role = "start";
                        else if (i === updated.length - 1) role = "end";
                        return { ...node, role };
                    });
                }
                setNodes(updated);
            };

            const toggleMeal = (nodeId, dateString, mealType) => {
                setNodes(prev => prev.map(node => {
                    if (node.id === nodeId) {
                        const currentMeals = node.meals || {};
                        const dayMeals = currentMeals[dateString] || { breakfast: false, lunch: false, dinner: false };
                        return {
                            ...node,
                            meals: {
                                ...currentMeals,
                                [dateString]: { ...dayMeals, [mealType]: !dayMeals[mealType] }
                            }

                    return node;

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === "dragenter") {
                    dragCounter.current++;
                    setDragActive(true);
                } else if (e.type === "dragleave") {
                    dragCounter.current--;
                    if (dragCounter.current === 0) setDragActive(false);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragCounter.current = 0;
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleFile(e.dataTransfer.files[0]);
                }
            };

            const handleFileChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    handleFile(e.target.files[0]);
                }
            };

            const handleFile = (file) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    try {
                        if (file.name.endsWith('.json')) {
                            const parsed = JSON.parse(text);
                            const newRates = { ...rates };
                            Object.keys(parsed).forEach(k => {
                                if (parsed[k].full !== undefined && parsed[k].small !== undefined) {
                                    const fullVal = parseFloat(parsed[k].full);
                                    const smallVal = parseFloat(parsed[k].small);
                                    if (!isNaN(fullVal) && !isNaN(smallVal)) {
                                        newRates[k] = {
                                            name: parsed[k].name || k,
                                            full: fullVal,
                                            small: smallVal,
                                            currency: parsed[k].currency || "EUR",
                                            ...(parsed[k].lodging !== undefined ? { lodging: parseFloat(parsed[k].lodging) } : {})
                                        };
                                    }
                                }
                            });
                            setRates(newRates);
                            triggerToast("Successfully parsed and updated rates from JSON file!", "success");
                        } else {
                            const rows = text.split('\n');
                            const newRates = { ...rates };
                            rows.forEach((row, idx) => {
                                if (idx === 0) return;
                                const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                                if (cols.length >= 3) {
                                    const locationKey = cols[0];
                                    const fullVal = parseFloat(cols[1]);
                                    const smallVal = parseFloat(cols[2]);
                                    if (locationKey && !isNaN(fullVal) && !isNaN(smallVal)) {
                                        newRates[locationKey] = {
                                            name: locationKey,
                                            full: fullVal,
                                            small: smallVal,
                                            currency: cols[3] || "EUR"
                                        };
                                    }
                                }
                            });
                            setRates(newRates);
                            triggerToast("Successfully imported updated rates from CSV file!", "success");
                        }
                    } catch (err) {
                        triggerToast("Failed to parse file. Ensure format matches the template.", "error");
                    }

                                                                <button
                                                                    onClick={() => toggleMeal(day.nodeId, day.date, 'breakfast')}
                                                                    className={`flex items-center space-x-1.5 px-2 py-1.5 rounded-lg border text-[11px] font-medium transition-all ${
                                                                        day.breakfastProvided
                                                                            ? "bg-rose-50 border-rose-200 text-rose-700"
                                                                            : "bg-white border-neutral-200 text-neutral-600 hover:bg-neutral-50"
                                                                    }`}
                                                                    aria-label={`Toggle breakfast for ${day.date}`}
                                                                >
                                                                    <Icon name="coffee" className="w-3.5 h-3.5 flex-shrink-0" />
                                                                    <span className="truncate">Breakfast</span>
                                                                    <span className="hidden sm:inline">(-20%)</span>
                                                                </button>

                                                                <button
                                                                    onClick={() => toggleMeal(day.nodeId, day.date, 'lunch')}
                                                                    className={`flex items-center space-x-1 sm:space-x-1.5 px-1.5 sm:px-2 py-1.5 rounded-lg border text-[10px] sm:text-[11px] font-medium transition-all ${
                                                                        day.lunchProvided
                                                                            ? "bg-rose-50 border-rose-200 text-rose-700"
                                                                            : "bg-white border-neutral-200 text-neutral-600 hover:bg-neutral-50"
                                                                    }`}
                                                                    aria-label={`Toggle lunch for ${day.date}`}
                                                                >
                                                                    <Icon name="utensils" className="w-3.5 h-3.5 flex-shrink-0" />
                                                                    <span className="truncate">Lunch</span>
                                                                    <span className="hidden sm:inline">(-40%)</span>
                                                                </button>

                                                                <button
                                                                    onClick={() => toggleMeal(day.nodeId, day.date, 'dinner')}
                                                                    className={`flex items-center space-x-1 sm:space-x-1.5 px-1.5 sm:px-2 py-1.5 rounded-lg border text-[10px] sm:text-[11px] font-medium transition-all ${
                                                                        day.dinnerProvided
                                                                            ? "bg-rose-50 border-rose-200 text-rose-700"
                                                                            : "bg-white border-neutral-200 text-neutral-600 hover:bg-neutral-50"
                                                                    }`}
                                                                    aria-label={`Toggle dinner for ${day.date}`}
                                                                >
                                                                    <Icon name="utensils" className="w-3.5 h-3.5 flex-shrink-0" />
                                                                    <span className="truncate">Dinner</span>
                                                                    <span className="hidden sm:inline">(-40%)</span>
                                                                </button>

                                                            </div>

                                                            {day.totalDeductionsForDay > 0 && (
                                                                <div className="mt-2 text-[10px] text-rose-600 font-medium flex items-center justify-end">
                                                                    <span>Meal reductions: -{rates[day.location]?.currency || 'EUR'}{day.totalDeductionsForDay.toFixed(2)} (of 24h rate {rates[day.location]?.currency || 'EUR'}{day.fullRate})</span>
                                                                </div>
                                                            )}
                                                        </div>

                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            </>
                        )}

                        {activeTab === "rates" && (
                            <div className="lg:col-span-12 flex flex-col space-y-6">
                                <div className="text-center max-w-2xl mx-auto py-6">
                                    <h1 className="text-3xl font-extrabold text-neutral-900 tracking-tight">
                                        BMF Rates Directory
                                    </h1>
                                    <p className="text-sm text-neutral-500 mt-2">
                                        Manage, edit, or upload current official German Federal Ministry of Finance (*Bundesministerium der Finanzen*) rates table. Keep your company allowances 100% compliant.
                                    </p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

                                    {/* Upload Area */}
                                    <div
                                        onDragEnter={handleDrag}
                                        onDragOver={handleDrag}
                                        onDragLeave={handleDrag}
                                        onDrop={handleDrop}
                                        className={`border-2 border-dashed rounded-2xl p-6 text-center flex flex-col items-center justify-center transition-all cursor-pointer ${
                                            dragActive
                                                ? "border-neutral-950 bg-neutral-50"
                                                : "border-neutral-200 hover:border-neutral-400 bg-white"
                                        }`}
                                        onClick={() => fileInputRef.current.click()}
                                        role="button"
                                        aria-label="Upload BMF rates file"
                                    >
                                        <input
                                            ref={fileInputRef}
                                            type="file"
                                            className="hidden"
                                            accept=".csv,.json"
                                            onChange={handleFileChange}
                                            aria-label="Select CSV or JSON file"
                                        />
                                        <div className="h-12 w-12 rounded-full bg-neutral-100 flex items-center justify-center text-neutral-600 mb-3">
                                            <Icon name="upload" className="w-5 h-5" />
                                        </div>
                                        <h3 className="font-semibold text-neutral-900 text-sm">Upload Custom BMF File</h3>
                                        <p className="text-xs text-neutral-500 mt-1 max-w-xs">
                                            Drag and drop your updated official `.csv` or `.json` file of country rates here.
                                        </p>
                                        <div className="mt-4 flex items-center space-x-2">
                                            <button
                                                type="button"
                                                onClick={(e) => { e.stopPropagation(); downloadSampleCSV(); }}
                                                className="text-xs text-neutral-500 hover:text-neutral-900 underline flex items-center space-x-1"
                                            >
                                                <Icon name="download" className="w-3 h-3" />
                                                <span>Download CSV Template</span>
                                            </button>
                                        </div>
                                    </div>

                                    {/* Manual Entry override form */}
                                    <div className="bg-white border border-neutral-200 rounded-2xl p-6 shadow-xs">
                                        <h3 className="font-semibold text-neutral-900 text-sm mb-1">Add or Override Single Location</h3>
                                        <p className="text-xs text-neutral-500 mb-4">Input custom values or test updates directly.</p>

                                        <form onSubmit={addCustomRate} className="space-y-4">
                                            <div>
                                                <label htmlFor="custom-name" className="block text-[11px] font-medium text-neutral-600 uppercase mb-1">
                                                    Location / Region Name
                                                </label>
                                                <input
                                                    id="custom-name"
                                                    type="text"
                                                    required
                                                    placeholder="e.g. Switzerland (Zurich)"
                                                    value={customCountryName}
                                                    onChange={(e) => setCustomCountryName(e.target.value)}
                                                    className="w-full px-3 py-2 text-sm bg-neutral-50 border border-neutral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-neutral-900 text-neutral-800 font-medium"
                                                />
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label htmlFor="custom-full" className="block text-[11px] font-medium text-neutral-600 uppercase mb-1">
                                                        Full Rate (24h)
                                                    </label>
                                                    <input
                                                        id="custom-full"
                                                        type="number"
                                                        min="0"
                                                        required
                                                        value={customFullRate}
                                                        onChange={(e) => setCustomFullRate(e.target.value)}
                                                        className="w-full px-3 py-2 text-sm bg-neutral-50 border border-neutral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-neutral-900"
                                                    />
                                                </div>
                                                <div>
                                                    <label htmlFor="custom-small" className="block text-[11px] font-medium text-neutral-600 uppercase mb-1">
                                                        Small Rate (Arrival/Dep)
                                                    </label>
                                                    <input
                                                        id="custom-small"
                                                        type="number"
                                                        min="0"
                                                        required
                                                        value={customSmallRate}
                                                        onChange={(e) => setCustomSmallRate(e.target.value)}
                                                        className="w-full px-3 py-2 text-sm bg-neutral-50 border border-neutral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-neutral-900"
                                                    />
                                                </div>
                                            </div>

                                            <button
                                                type="submit"
                                                className="w-full bg-neutral-950 hover:bg-neutral-800 text-white text-xs font-semibold py-2.5 px-4 rounded-xl transition-colors flex items-center justify-center space-x-2"
                                            >
                                                <Icon name="plus" className="w-4 h-4" />
                                                <span>Register New Rate</span>
                                            </button>
                                        </form>
                                    </div>

                                </div>

                                {/* Active BMF Catalog Database */}
                                <div className="bg-white border border-neutral-200 rounded-2xl overflow-hidden shadow-xs">
                                    <div className="p-4 border-b border-neutral-100 flex items-center justify-between">
                                        <h3 className="font-semibold text-neutral-900 text-sm">
                                            Active BMF Database Catalog
                                        </h3>
                                        <div className="relative">
                                            <div className="absolute left-2.5 top-2.5 text-neutral-400"><Icon name="search" className="w-4 h-4" /></div>
                                            <label htmlFor="rates-search" className="sr-only">Search locations</label>
                                            <input
                                                id="rates-search"
                                                type="text"
                                                placeholder="Search locations..."
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                                className="pl-8 pr-3 py-1.5 text-xs bg-neutral-50 border border-neutral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-neutral-900 w-48 md:w-64"
                                            />
                                        </div>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm text-neutral-700">
                                            <thead className="bg-neutral-50 text-[10px] text-neutral-500 uppercase font-bold tracking-wider border-b border-neutral-100">
                                                <tr>
                                                    <th className="py-3 px-6">Location</th>
                                                    <th className="py-3 px-6">Full Day (&ge;24 Hours)</th>
                                                    <th className="py-3 px-6">Small Day (8-24h &amp; Arrival/Departure)</th>
                                                    <th className="py-3 px-6 text-right">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-neutral-100 font-medium">
                                                {Object.keys(rates)
                                                    .filter(key => rates[key].name.toLowerCase().includes(searchQuery.toLowerCase()))
                                                    .sort((a, b) => rates[a].name.localeCompare(rates[b].name))
                                                    .map(key => {
                                                        const item = rates[key];
                                                        return (
                                                            <tr key={key} className="hover:bg-neutral-50/50 transition-colors">
                                                                <td className="py-3.5 px-6 font-semibold text-neutral-900">{item.name}</td>
                                                                <td className="py-3.5 px-6">{item.currency}{item.full.toFixed(2)}</td>
                                                                <td className="py-3.5 px-6">{item.currency}{item.small.toFixed(2)}</td>
                                                                <td className="py-3.5 px-6 text-right">
                                                                    <button
                                                                        onClick={() => {
                                                                            const updated = { ...rates };
                                                                            delete updated[key];
                                                                            setRates(updated);
                                                                            triggerToast(`Deleted ${item.name} from catalog overrides`, "success");
                                                                        }}
                                                                        className="text-rose-600 hover:text-rose-800 text-xs transition-colors"
                                                                        aria-label={`Delete ${item.name}`}
                                                                    >
                                                                        Delete
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        )}

                    </main>

                    {/* Invoice-friendly printed template layout */}
                    <div id="print-section" className="hidden print:block p-8 bg-white text-black font-sans w-full leading-normal">
                        <div className="flex justify-between items-start border-b-2 border-neutral-950 pb-6 mb-8">
                            <div>
                                <h1 className="text-2xl font-black uppercase tracking-tight">German Travel Expense Statement</h1>
                                <p className="text-xs text-neutral-500 mt-1">Verpflegungsmehraufwand (BMF tax calculation)</p>
                            </div>
                            <div className="text-right">
                                <span className="block font-bold text-sm">Statement Date</span>
                                <span className="text-xs">{new Date().toLocaleDateString("en-US")}</span>
                            </div>
                        </div>

                        {/* Itinerary Nodes */}
                        <div className="mb-8">
                            <h2 className="text-sm font-bold uppercase tracking-wide border-b border-neutral-300 pb-1 mb-3">Travel Topology Timeline</h2>
                            <div className="space-y-2">
                                {nodes.map((node, i) => (
                                    <div key={node.id} className="text-xs flex justify-between">
                                        <span><strong>Node {i + 1} ({node.role.toUpperCase()}):</strong> {node.location}</span>
                                        <span className="font-mono">{new Date(node.dateTime).toLocaleString("en-US")}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Breakdown */}
                        <div className="mb-8">
                            <h2 className="text-sm font-bold uppercase tracking-wide border-b border-neutral-300 pb-1 mb-3">Claim Breakdown by Day</h2>
                            <table className="w-full text-left text-xs">
                                <thead>
                                    <tr className="border-b border-neutral-300 bg-neutral-100 font-bold">
                                        <th className="p-2">Day Date</th>
                                        <th className="p-2">Applicable Location</th>
                                        <th className="p-2">Status Type</th>
                                        <th className="p-2">Full / Small</th>
                                        <th className="p-2">Lodging</th>
                                        <th className="p-2">Base</th>
                                        <th className="p-2">Meals Deductions</th>
                                        <th className="p-2 text-right">Net Reimbursement</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {dayCalculation.map((day, idx) => (
                                        <tr key={idx} className="border-b border-neutral-200">
                                            <td className="p-2 font-mono">{day.date}</td>
                                            <td className="p-2">{rates[day.location]?.name || day.location}</td>
                                            <td className="p-2">{day.statusText}</td>
                                            <td className="p-2">{rates[day.location]?.currency || 'EUR'}{day.fullRate} / {day.smallRate}</td>
                                            <td className="p-2">{rates[day.location]?.lodging ? `${rates[day.location]?.currency}${rates[day.location].lodging}` : '—'}</td>
                                            <td className="p-2">{rates[day.location]?.currency || 'EUR'}{day.baseAllowance}</td>
                                            <td className="p-2">
                                                {day.breakfastProvided && "Breakfast(-20%) "}
                                                {day.lunchProvided && "Lunch(-40%) "}
                                                {day.dinnerProvided && "Dinner(-40%)"}
                                                {day.totalDeductionsForDay > 0 ? ` (-${rates[day.location]?.currency || 'EUR'}${day.totalDeductionsForDay.toFixed(2)})` : "None"}
                                            </td>
                                            <td className="p-2 text-right font-bold">{rates[day.location]?.currency || 'EUR'}{day.netAllowance.toFixed(2)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {/* Totals */}
                        <div className="flex justify-end pt-4 border-t border-neutral-400">
                            <div className="text-right space-y-1">
                                <div className="text-xs">Base Sum: EUR{originalTotal.toFixed(2)}</div>
                                <div className="text-xs text-rose-600">Total Deductions: -EUR{totalReductions.toFixed(2)}</div>
                                <div className="text-base font-black border-t border-neutral-950 pt-2">
                                    Payable Allowance Sum: EUR{totalClaim.toFixed(2)}
                                </div>
                            </div>
                        </div>

                        {/* Audit Signatures */}
                        <div className="mt-16 grid grid-cols-2 gap-12 text-center text-xs">
                            <div className="border-t border-neutral-400 pt-3">
                                <span className="block font-bold">Traveler's Signature</span>
                                <span className="text-neutral-400">Date: ________________________</span>
                            </div>
                            <div className="border-t border-neutral-400 pt-3">
                                <span className="block font-bold">Authorized Auditor / Accounting Signature</span>
                                <span className="text-neutral-400">Date: ________________________</span>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        // Mount App with Error Boundary
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
